<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <h1 class="result"></h1>
    <div class="game-board">
        <div class="cell 0 0" onclick="cellClicked(event)"></div>
        <div class="cell 0 1" onclick="cellClicked(event)"></div>
        <div class="cell 0 2" onclick="cellClicked(event)"></div>
        
        <div class="cell 1 0" onclick="cellClicked(event)"></div>
        <div class="cell 1 1" onclick="cellClicked(event)"></div>
        <div class="cell 1 2" onclick="cellClicked(event)"></div>

        <div class="cell 2 0" onclick="cellClicked(event)"></div>
        <div class="cell 2 1" onclick="cellClicked(event)"></div>
        <div class="cell 2 2" onclick="cellClicked(event)"></div>
    </div>
    <button onclick="gameboard.resetBoard(DisplayController)">Reset</button> <br>

    <div class="player-names">
        <div class="player-1">
            <h2> Player 1 </h2>
            <label for="player-1-name"> Name </label>
            <input id="player-1-name" name="player-1-name" type="text" oninput="changeName(event)" value="John">
        </div>

        <div class="player-2">
            <h2> Player 2 </h2>
            <label for="player-2-name"> Name </label>
            <input id="player-2-name" name="player-2-name" type="text" oninput="changeName(event)" value="Jane">
        </div>
    </div>
    <script src="ticTacToe.js"></script>
</body>
</html>
